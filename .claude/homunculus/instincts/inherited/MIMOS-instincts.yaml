# MIMOS Workflow Theme Update Across Public And Admin Ui

## Action

Follow the theme-update-across-public-and-admin-ui workflow:
1. Update global stylesheet (e.g., globals.css) with new color variables or theme rules.
2. Modify public-facing page components to use new theme styles.
3. Modify admin dashboard page components to use new theme styles.
4. Update shared layout components (Header, Footer) to match new theme.
5. Update any landing or catalog components to reflect theme changes.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/app/(public)/*/page.tsx, src/app/admin/(dashboard)/*.tsx, src/app/globals.css

